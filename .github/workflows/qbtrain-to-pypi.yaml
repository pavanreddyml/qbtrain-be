name: Publish to PyPI

# Releases are TAG-ONLY. The package version is the git tag (vX.Y.Z) with the
# `v` stripped, injected via SETUPTOOLS_SCM_PRETEND_VERSION. A non-tagged build
# fails; PyPI itself rejects re-uploading an existing version.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: {}

jobs:
  deploy:
    name: Build and Publish to PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Require a SemVer release tag
        run: |
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "::error::Releases must be built from a version tag (vX.Y.Z), not a branch. Tag a new version and push the tag."
            exit 1
          fi
          if ! printf '%s' "${GITHUB_REF_NAME}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '${GITHUB_REF_NAME}' is not a SemVer release tag (expected vMAJOR.MINOR.PATCH)."
            exit 1
          fi

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build Package
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.ver.outputs.version }}
        run: python -m build
        working-directory: python/qbtrain

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
        working-directory: python/qbtrain
